        function renderNutrition() {

            <div class="space-y-6 fade-in-zoom">

                <div class="grid grid-cols-2 gap-4">

                <div class="space-y-4">
                    ${currentData.meals.map(meal => `

        function renderProgress() {
            return `
            <div class="space-y-8 fade-in-zoom">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <h3 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">

                            <canvas id="weightChart"></canvas>

                            <div class="text-center">

                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">

                    <select id="exerciseSelect" onchange="updateExerciseDetails(this.value)" class="w-full bg-slate-900 border border-slate-700 text-slate-200 rounded-lg p-3 mb-2 focus:outline-none focus:border-blue-500 cursor-pointer">

                    <div id="exerciseDetailsContent">

                <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-5 rounded-xl border border-slate-700">

        function renderVideos() {
            return `
            <div class="space-y-6 fade-in-zoom">

                                    <div>
                                        <h4 class="font-bold text-slate-100 group-hover:text-orange-400 transition-colors">${video.title}</h4>

                                            ${video.category}
                                        </span>

                                <i data-lucide="external-link" class="w-4 h-4 text-slate-500 group-hover:text-orange-400"></i>

                    `).join('') : `
                        <div class="text-center py-10">
                            <p class="text-slate-500">אין סרטונים זמינים כרגע</p>
                        </div>
                    `}
                </div>
            </div>`;
        }

        // --- אתחול הגרפים ---
        function initCharts() {
            // השמדת גרפים ישנים אם קיימים כדי למנוע כפילויות
            chartsInstance.forEach(chart => chart.destroy());
            chartsInstance = [];

            // הגדרות ברירת מחדל לגרפים שיתאימו לעיצוב הכהה
            Chart.defaults.color = '#94a3b8';
            Chart.defaults.font.family = 'Assistant, sans-serif';

            if (progressData.weight.length > 1) {
                const ctxWeight = document.getElementById('weightChart').getContext('2d');
                const weightChart = new Chart(ctxWeight, {
                    type: 'line',
                    data: {
                        labels: progressData.weight.map(d => d.date),
                        datasets: [{
                            label: 'משקל',
                            data: progressData.weight.map(d => d.weight),
                            borderColor: '#a855f7',
                            backgroundColor: '#a855f7',
                            borderWidth: 3,
                            pointBackgroundColor: '#a855f7',
                            pointRadius: 4,
                            tension: 0.3
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { grid: { color: '#334155', drawBorder: false } },
                            y: { grid: { color: '#334155', drawBorder: false } }
                        }
                    }
                });
                chartsInstance.push(weightChart);
            }

            if (progressData.strength.length > 0) {
                const ctxStrength = document.getElementById('strengthChart').getContext('2d');
                const strengthChart = new Chart(ctxStrength, {
                    type: 'bar',
                    data: {
                        labels: progressData.strength.map(d => d.exercise),
                        datasets: [
                            {
                                label: 'משקל התחלה',
                                data: progressData.strength.map(d => d.prev),
                                backgroundColor: '#475569',
                                borderRadius: 4
                            },
                            {
                                label: 'שיא נוכחי',
                                data: progressData.strength.map(d => d.current),
                                backgroundColor: '#3b82f6',
                                borderRadius: 4
                            }
                        ]
                    },
                    options: {
                        indexAxis: 'y',
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top', labels: { color: '#e2e8f0' } }
                        },
                        scales: {
                            x: { grid: { color: '#334155', drawBorder: false } },
                            y: { grid: { display: false, drawBorder: false } }
                        }
                    }
                });
                chartsInstance.push(strengthChart);
            }
        }

        // --- הרינדור הראשי ---
        function render() {
            const root = document.getElementById('app-root');
            
            let mainContent = '';
            if (activeTab === 'workouts') mainContent = renderWorkouts();
            else if (activeTab === 'nutrition') mainContent = renderNutrition();
            else if (activeTab === 'progress') mainContent = renderProgress();
            else if (activeTab === 'videos') mainContent = renderVideos();

            root.innerHTML = `
                ${renderHeader()}
                <main class="max-w-md mx-auto p-4 pb-24">
                    ${mainContent}
                </main>
            `;

            // אתחול האייקונים של Lucide אחרי רינדור ה-HTML
            lucide.createIcons();

            // אם עברנו לטאב הגרפים, נצייר אותם
            if (activeTab === 'progress') {
                initCharts();
                updateExerciseDetails(selectedProgressExercise);
            }
        }

        // --- הפעלה ראשונית של האפליקציה ---
        window.onload = () => {
            render();
        };

    </script>
</body>
</html>
